<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 Palle o 3 Croci</title>
  <!--Sono troppo fiero di questo codice per aggiungere easteregg-->
  <style>
    :root {
      --background-color: #121212;
      --text-color: #ffffff;
      --accent-color: #ff5722;
    }

    body {
      margin: 0;
      height: 100vh;
      background-color: var(--background-color);
      color: var(--text-color);
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 5px;
      margin-bottom: 20px;
    }

    .board div {
      width: 100px;
      height: 100px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: var(--background-color);
      border: 2px solid var(--accent-color);
      color: var(--text-color);
      font-size: 2rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .board div:hover {
      background-color: var(--accent-color);
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: var(--accent-color);
      color: var(--background-color);
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #ff3d00;
    }

    #gameStatus {
      font-size: 1.2rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>Tic Tac Toe</h1>
    <div id="board" class="board"></div>
    <button id="resetButton">Reset Game</button>
    <p id="gameStatus">Your turn (X)</p>
  </div>

  <script>
    const board = document.getElementById('board');
    const resetButton = document.getElementById('resetButton');
    const gameStatus = document.getElementById('gameStatus');

    let boardState = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameActive = true;
    let isProcessingMove = false; // Flag per prevenire doppi click

    // Create the board dynamically
    function createBoard() {
      board.innerHTML = '';
      boardState.forEach((cell, index) => {
        const cellDiv = document.createElement('div');
        cellDiv.classList.add('cell');
        cellDiv.textContent = cell;
        cellDiv.addEventListener('click', () => handleCellClick(index));
        board.appendChild(cellDiv);
      });
    }

    // Handle a cell click
    function handleCellClick(index) {
      if (boardState[index] !== '' || !gameActive || isProcessingMove || currentPlayer !== 'X') return;

      isProcessingMove = true; // Blocca ulteriori click durante l'elaborazione
      
      boardState[index] = 'X';
      gameStatus.textContent = "Turno dello stronzo (O)";
      checkWinner();
      createBoard();

      if (gameActive) {
        setTimeout(() => {
          makeBotMove();
          isProcessingMove = false; // Sblocca dopo che il bot ha mosso
        }, 500);
      } else {
        isProcessingMove = false;
      }
    }

    // Check if a player has won or if the game is a draw
    function checkWinner() {
      const winningCombinations = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
        [0, 4, 8], [2, 4, 6], // Diagonals
      ];

      for (const [a, b, c] of winningCombinations) {
        if (boardState[a] && boardState[a] === boardState[b] && boardState[a] === boardState[c]) {
          gameStatus.textContent = `${boardState[a]} vincitore di questo grandissimo cazzo!`;
          gameActive = false;
          return;
        }
      }

      if (!boardState.includes('')) {
        gameStatus.textContent = "PAREGGIO RICCHIONE!";
        gameActive = false;
      }
    }

    // Reset the game
    function resetGame() {
      boardState = ['', '', '', '', '', '', '', '', ''];
      currentPlayer = 'X';
      gameActive = true;
      isProcessingMove = false;
      gameStatus.textContent = "il tuo turno muovi il culo giagro (X)";
      createBoard();
    }

    // Bot logic using Minimax algorithm
    function makeBotMove() {
      if (!gameActive) return;

      const bestMove = minimax(boardState, 'O').index;
      boardState[bestMove] = 'O';
      checkWinner();
      updateGameStatus();
      createBoard();
    }

    // Minimax algorithm implementation
    function minimax(newBoard, player) {
      const availableSpots = newBoard
        .map((cell, index) => (cell === '' ? index : null))
        .filter(index => index !== null);

      if (checkWin(newBoard, 'X')) {
        return { score: -10 };
      } else if (checkWin(newBoard, 'O')) {
        return { score: 10 };
      } else if (availableSpots.length === 0) {
        return { score: 0 };
      }

      const moves = [];

      for (const spot of availableSpots) {
        const move = {};
        move.index = spot;
        newBoard[spot] = player;

        if (player === 'O') {
          const result = minimax(newBoard, 'X');
          move.score = result.score;
        } else {
          const result = minimax(newBoard, 'O');
          move.score = result.score;
        }

        newBoard[spot] = '';
        moves.push(move);
      }

      let bestMove;
      if (player === 'O') {
        let bestScore = -Infinity;
        for (const move of moves) {
          if (move.score > bestScore) {
            bestScore = move.score;
            bestMove = move;
          }
        }
      } else {
        let bestScore = Infinity;
        for (const move of moves) {
          if (move.score < bestScore) {
            bestScore = move.score;
            bestMove = move;
          }
        }
      }

      return bestMove;
    }

    // Helper function to check if a player has won
    function checkWin(board, player) {
      const winningCombinations = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6],
      ];

      return winningCombinations.some(([a, b, c]) =>
        board[a] === player && board[b] === player && board[c] === player
      );
    }

    // Update the game status after the bot's move
    function updateGameStatus() {
      if (gameActive) {
        gameStatus.textContent = "Your turn (X)";
      }
    }

    resetButton.addEventListener('click', resetGame);

    // Initialize the board when the page loads
    createBoard();
  </script>
</body>
</html>
